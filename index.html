<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">    
    <title>Library FAQ Assistant</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
</head>
<body>

    <div class="chatbot-container" id="bot-window">
        <div class="header">
            <span class="header-title">Library FAQ Assistant</span>
            <button onclick="endChat()" class="clear-btn">CLEAR</button>
        </div>
        
        <div id="chat-content" class="tab-content">
            <div id="chat" class="messages"></div>
            <div id="typing">Bot is typing...</div>
            <div class="input-area">
                <div id="suggestion-container" class="suggestion-box" style="display: none;"></div>
                <input id="msg" placeholder="Type your message..." oninput="showLiveSuggestions()" onkeypress="if(event.key==='Enter') send()">
                <button onclick="send()" class="send-btn">➤</button>
            </div>
        </div>

        <div id="faq-content" class="tab-content" style="display: none;">
            <div class="search-container">
                <input type="text" id="faq-search" class="faq-search" placeholder="🔍 Search library FAQs..." oninput="filterFAQs()">
            </div>
            <div id="faq-list" class="faq-view"></div>
        </div>

        <div class="tab-bar">
            <button onclick="switchTab('chat')" id="btn-chat-tab" class="tab-btn active-tab">CHAT</button>
            <button onclick="switchTab('faq')" id="btn-faq-tab" class="tab-btn">FAQ</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
